<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attention Tracking Demo</title>
    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .wrapper {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: space-evenly;
      }

      video,
      canvas {
        width: 720px;
        border-radius: 12px;
        margin-top: 20px;
      }

      #stats {
        margin-top: 15px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <h1>AttentionTracker Demo</h1>
    <div class="wrapper">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div id="stats">Loading...</div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
